<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telebey — Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== AUTH SCREEN ===== -->
    <div id="auth-container" class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">✈</div>
                <h1>Telebey</h1>
                <p>Sign in to your account</p>
            </div>
            <div class="input-group">
                <div class="input-field">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="input-field">
                    <label for="auth-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="auth-password" placeholder="Enter password" autocomplete="current-password">
                        <button class="toggle-password" id="toggle-pw" title="Show password">👁</button>
                    </div>
                </div>
            </div>
            <div id="auth-error" class="auth-error" style="display:none;"></div>
            <div class="auth-buttons">
                <button id="login-btn" class="btn-primary">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" style="display:none;">⟳</span>
                </button>
                <button id="signup-btn" class="btn-secondary">Create Account</button>
            </div>
            <p class="auth-footer">Your messages are end-to-end encrypted</p>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div id="main-app" class="app-container" style="display:none;">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title-row">
                    <div class="sidebar-brand">
                        <span class="sidebar-logo">✈</span>
                        <h3>Telebey</h3>
                    </div>
                    <div class="sidebar-actions">
                        <button class="icon-btn" id="new-room-btn" title="New Room">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                        <button class="icon-btn" id="logout-btn" title="Sign Out">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        </button>
                    </div>
                </div>
                <div class="sidebar-search">
                    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="room-search" placeholder="Search rooms..." autocomplete="off">
                </div>
            </div>
            <div class="chat-list" id="group-list">
                <div class="list-loading">
                    <div class="skeleton-item"></div>
                    <div class="skeleton-item"></div>
                    <div class="skeleton-item"></div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar avatar-sm" id="user-avatar-sidebar">?</div>
                    <span id="user-display-name" class="user-email-text">Loading…</span>
                </div>
            </div>
        </aside>
<div class="app-logo">
    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 2L2 10.5L9.5 14.5L13.5 22L22 2Z" fill="#5288c1"/>
    </svg>
</div>
        <!-- NEW ROOM MODAL -->
        <div id="new-room-modal" class="modal-overlay" style="display:none;">
            <div class="modal-card">
                <div class="modal-header">
                    <h3>Create New Room</h3>
                    <button class="icon-btn" id="close-modal-btn">✕</button>
                </div>
                <div class="modal-body">
                    <div class="input-field">
                        <label>Room Name</label>
                        <input type="text" id="new-group-name" placeholder="e.g. Family, Work Team…" maxlength="60">
                    </div>
                    <div class="input-field">
                        <label>Description <span style="color:#7f8c9d;font-weight:400;">(optional)</span></label>
                        <input type="text" id="new-group-desc" placeholder="What's this room about?" maxlength="120">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" id="cancel-modal-btn">Cancel</button>
                    <button class="btn-primary" id="make-group-btn">Create Room</button>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <main class="chat-area">
            <!-- No room selected state -->
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">✈</div>
                <h2>Welcome to Telebey</h2>
                <p>Select a room from the sidebar or create a new one to start chatting.</p>
                <button class="btn-primary" id="empty-new-room-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Room
                </button>
            </div>

            <!-- Active chat view -->
            <div id="chat-view" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
                <div class="chat-header" id="chat-header">
                    <button class="icon-btn back-btn" id="back-btn" title="Back">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <div class="chat-header-avatar" id="chat-avatar">G</div>
                    <div class="chat-header-info">
                        <strong id="chat-room-name">Room Name</strong>
                        <span id="chat-room-status" class="chat-status">Loading…</span>
                    </div>
                </div>

                <div class="messages-container" id="message-box">
                    <div class="messages-date-label">Today</div>
                </div>

                <!-- Image preview before send -->
                <div id="image-preview-bar" class="image-preview-bar" style="display:none;">
                    <img id="preview-img" src="" alt="preview">
                    <button id="cancel-image-btn" class="cancel-img-btn" title="Remove">✕</button>
                </div>

                <div class="input-area">
                    <input type="file" id="media-input" accept="image/*,video/*" style="display:none;">
                    <button class="attach-btn icon-btn" id="attach-btn" title="Attach file">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <div class="input-wrapper">
                        <textarea id="user-input" placeholder="Message…" autocomplete="off" rows="1"></textarea>
                    </div>
                    <button id="send-btn" class="send-btn" title="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
